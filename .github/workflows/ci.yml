name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Warnings-as-errors gate: the engine parses untrusted HTML/CSS/images/
          # fonts, so a new compiler diagnostic must fail the build.
          - name: warnings-as-errors
            cmake_extra: -DPAGECORE_WERROR=ON
            ctest_env: ""
          # ASan + UBSan over the whole tree (including the vendored parsers) to
          # catch memory-safety and UB regressions in the untrusted-input paths.
          - name: sanitizers
            cmake_extra: -DPAGECORE_SANITIZE=address,undefined
            ctest_env: "ASAN_OPTIONS=detect_leaks=0:abort_on_error=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config g++ git nodejs \
            libcurl4-openssl-dev zlib1g-dev libpsl-dev \
            libcairo2-dev libpango1.0-dev libfontconfig1-dev libfreetype-dev \
            libharfbuzz-dev libbrotli-dev libturbojpeg0-dev libwebp-dev \
            libgif-dev libpng-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ${{ matrix.ctest_env }} ctest --test-dir build --output-on-failure --timeout 300
