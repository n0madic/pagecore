name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (warnings-as-errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config g++ git nodejs \
            libcurl4-openssl-dev zlib1g-dev libpsl-dev \
            libcairo2-dev libpango1.0-dev libfontconfig1-dev libfreetype-dev \
            libharfbuzz-dev libbrotli-dev libturbojpeg0-dev libwebp-dev \
            libgif-dev libpng-dev

      # Warnings-as-errors gate: the engine parses untrusted HTML/CSS/images/fonts,
      # so a new compiler diagnostic must fail the build. ASan/UBSan are available
      # for local runs via -DPAGECORE_SANITIZE=address,undefined; they are not run
      # in CI because a few event-loop/CSSOM tests are sensitive to the sanitizer's
      # runtime perturbations (timing slowdown, changed allocation order) rather
      # than to any real defect.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DPAGECORE_WERROR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          # Skip rendering assertions pinned to a specific font environment (exact
          # glyph metrics / text-run counts). The display-list reftest compares an
          # exact command count against a reference generated elsewhere, so it is
          # excluded too; the font-independent bulk of the suite still gates CI.
          PAGECORE_SKIP_ENV_SENSITIVE_TESTS: "1"
        run: >
          ctest --test-dir build --output-on-failure --timeout 300
          --exclude-regex 'pagecore_display_list_reftests'
